<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links Externos</title>
</head>
<body>
            <h1>Links externos </h1>
            <p>Para fazer um link externo usamos a tag "a" de ancora <br>é recomendavel que se use target = "_blank" e  também  rel="external"</p>
           
            <h2>Exemplo sem target</h2>
            <p>Acesse o meu canal no youtube <a href="https://www.youtube.com/@osprimosdev">os primos dev</a></p>
            <h2>Exemplo com target="_black" e rel=external</h2>
            <p>Acesse o meu canal no youtube <a href="https://www.youtube.com/@osprimosdev" target="_blank" rel="external">os primos dev</a></p>
</body>
</html>
